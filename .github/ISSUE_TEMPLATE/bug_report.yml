name: Bug report
description: Report incorrect behavior, broken documentation, or tooling failure.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include commands, emulator configuration, logs, or links.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Host OS, compiler, emulator, CPU architecture, and branch.
    validations:
      required: false
